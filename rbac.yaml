apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: workload-editor
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["apps"] 
  resources: ["deployments"]
  verbs: ["get", "watch", "list"]


---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workload-editor-binding
  namespace: default
subjects:
- kind: User
  name: seema # Name is case sensitive
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: junior-admins
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: workload-editor
  apiGroup: rbac.authorization.k8s.io 
    
